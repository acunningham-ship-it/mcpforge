<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MCPForge — Generate MCP Servers</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/atom-one-dark.min.css" />
  <style>
    :root {
      --bg: #04040f;
      --card: #0d0d22;
      --border: #1a1a35;
      --cyan: #00d4ff;
      --green: #00ff88;
      --purple: #8b5cf6;
      --text: #e2e8f0;
      --dim: #94a3b8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    #root {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      background: rgba(4, 4, 15, 0.95);
      backdrop-filter: blur(10px);
      z-index: 100;
    }

    .logo {
      font-weight: 700;
      font-size: 1.1rem;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logo-badge {
      background: rgba(0, 212, 255, 0.1);
      border: 1px solid rgba(0, 212, 255, 0.2);
      color: var(--cyan);
      padding: 3px 10px;
      border-radius: 100px;
      font-size: 0.7rem;
      font-weight: 600;
    }

    nav {
      display: flex;
      gap: 16px;
      margin-left: auto;
    }

    nav button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--dim);
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
      transition: all 0.2s;
    }

    nav button:hover {
      color: var(--text);
      border-color: var(--cyan);
    }

    nav button.active {
      background: rgba(0, 212, 255, 0.1);
      border-color: var(--cyan);
      color: var(--cyan);
    }

    main {
      flex: 1;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      padding: 48px 24px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .sub {
      color: var(--dim);
      margin-bottom: 40px;
    }

    label {
      display: block;
      color: var(--dim);
      font-size: 0.875rem;
      margin-bottom: 6px;
      font-weight: 500;
    }

    input,
    select {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus,
    select:focus {
      border-color: var(--cyan);
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      margin-bottom: 24px;
    }

    .field {
      margin-bottom: 20px;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type='checkbox'] {
      width: auto;
    }

    button:not(nav button) {
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      color: #000;
      font-weight: 700;
      border: none;
      padding: 12px 28px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    button:not(nav button):hover {
      opacity: 0.9;
    }

    button:not(nav button):disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .examples {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .ex-btn {
      background: rgba(0, 212, 255, 0.08) !important;
      border: 1px solid rgba(0, 212, 255, 0.2) !important;
      color: var(--cyan) !important;
      padding: 6px 14px !important;
      border-radius: 100px !important;
      font-size: 0.8rem !important;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .ex-btn:hover {
      background: rgba(0, 212, 255, 0.15) !important;
    }

    .result {
      display: none;
      margin-top: 32px;
    }

    .result.show {
      display: block;
    }

    .result-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .result-title {
      font-weight: 700;
    }

    .result-meta {
      color: var(--dim);
      font-size: 0.85rem;
    }

    .copy-btn {
      background: var(--border) !important;
      color: var(--dim) !important;
      border: none !important;
      padding: 6px 14px !important;
      border-radius: 6px !important;
      font-size: 0.8rem !important;
      cursor: pointer;
      font-weight: 500;
    }

    .copy-btn:hover {
      background: var(--cyan) !important;
      color: #000 !important;
    }

    pre {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
      overflow-x: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.8rem;
      line-height: 1.7;
      max-height: 500px;
      overflow-y: auto;
    }

    pre code {
      color: var(--text);
    }

    .tools-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 16px;
    }

    .tool-pill {
      background: rgba(0, 255, 136, 0.08);
      border: 1px solid rgba(0, 255, 136, 0.2);
      color: var(--green);
      padding: 3px 12px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-family: monospace;
    }

    .error {
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #f87171;
      padding: 16px;
      border-radius: 8px;
      margin-top: 20px;
    }

    .loading {
      display: none;
      color: var(--dim);
      font-size: 0.9rem;
      margin-top: 12px;
    }

    .loading.show {
      display: block;
    }

    .spinner {
      display: inline-block;
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--cyan);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 32px 0;
    }

    .examples-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .example-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-card:hover {
      border-color: var(--cyan);
      transform: translateY(-2px);
    }

    .example-name {
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 1.1rem;
    }

    .example-desc {
      color: var(--dim);
      font-size: 0.875rem;
      margin-bottom: 16px;
    }

    .example-tools {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .example-code {
      margin-top: 32px;
    }

    .code-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }

    .code-lang {
      color: var(--dim);
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const EXAMPLES = {
      github: {
        name: '🐙 GitHub API',
        desc: 'Search repos, manage issues, view code — all from your AI assistant.',
        tools: ['list_repos', 'search_repos', 'get_repo', 'list_issues'],
        code: `#!/usr/bin/env python3
"""MCP server for GitHub API — auto-generated by MCPForge"""

import os
import httpx
from mcp.server.fastmcp import FastMCP

mcp = FastMCP("GitHub API")
BASE_URL = "https://api.github.com"
GITHUB_TOKEN = os.environ.get("GITHUB_TOKEN", "")

@mcp.tool()
def list_repos(owner: str, per_page: int = 30) -> dict:
    """List public repositories for a GitHub user."""
    headers = {"Authorization": f"Bearer {GITHUB_TOKEN}"} if GITHUB_TOKEN else {}
    resp = httpx.get(f"{BASE_URL}/users/{owner}/repos", params={"per_page": per_page}, headers=headers)
    resp.raise_for_status()
    return resp.json()

@mcp.tool()
def search_repos(q: str, per_page: int = 30) -> dict:
    """Search for repositories on GitHub."""
    resp = httpx.get(f"{BASE_URL}/search/repositories", params={"q": q, "per_page": per_page})
    resp.raise_for_status()
    return resp.json()

# ... and 2 more tools

if __name__ == "__main__":
    mcp.run()`,
      },
      weather: {
        name: '🌤️ Weather API',
        desc: 'Get current weather and forecasts for any city — no API key needed.',
        tools: ['get_weather', 'get_forecast'],
        code: `#!/usr/bin/env python3
"""MCP server for Weather API — auto-generated by MCPForge"""

import httpx
from mcp.server.fastmcp import FastMCP

mcp = FastMCP("Weather API")
BASE_URL = "https://api.open-meteo.com/v1"

@mcp.tool()
def get_weather(latitude: float, longitude: float) -> dict:
    """Get current weather for coordinates."""
    resp = httpx.get(f"{BASE_URL}/forecast", params={
        "latitude": latitude,
        "longitude": longitude,
        "current": "temperature,weather_code,wind_speed"
    })
    resp.raise_for_status()
    return resp.json()

@mcp.tool()
def get_forecast(latitude: float, longitude: float, days: int = 7) -> dict:
    """Get weather forecast for coordinates."""
    resp = httpx.get(f"{BASE_URL}/forecast", params={
        "latitude": latitude,
        "longitude": longitude,
        "daily": "temperature_2m_max,temperature_2m_min,weather_code",
        "forecast_days": days
    })
    resp.raise_for_status()
    return resp.json()

if __name__ == "__main__":
    mcp.run()`,
      },
      calculator: {
        name: '🧮 Calculator',
        desc: 'A simple math MCP server — perfect for testing your MCP client setup.',
        tools: ['add', 'subtract', 'multiply', 'divide'],
        code: `#!/usr/bin/env python3
"""MCP server for Calculator — auto-generated by MCPForge"""

from mcp.server.fastmcp import FastMCP

mcp = FastMCP("Calculator")

@mcp.tool()
def add(a: float, b: float) -> dict:
    """Add two numbers."""
    return {"result": a + b, "operation": "add"}

@mcp.tool()
def subtract(a: float, b: float) -> dict:
    """Subtract two numbers."""
    return {"result": a - b, "operation": "subtract"}

@mcp.tool()
def multiply(a: float, b: float) -> dict:
    """Multiply two numbers."""
    return {"result": a * b, "operation": "multiply"}

@mcp.tool()
def divide(a: float, b: float) -> dict:
    """Divide two numbers."""
    if b == 0:
        raise ValueError("Division by zero")
    return {"result": a / b, "operation": "divide"}

if __name__ == "__main__":
    mcp.run()`,
      },
    };

    function GeneratePage() {
      const [url, setUrl] = useState('');
      const [enhance, setEnhance] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [result, setResult] = useState(null);
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [result]);

      async function generate() {
        if (!url.trim()) return;

        setLoading(true);
        setError('');
        setResult(null);

        try {
          let data;
          if (url.startsWith('built-in:')) {
            const name = url.replace('built-in:', '');
            const resp = await fetch(`/api/examples/${name}`);
            if (!resp.ok) throw new Error(await resp.text());
            data = await resp.json();
          } else {
            const resp = await fetch('/api/generate', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ spec_url: url, enhance }),
            });
            if (!resp.ok) {
              const err = await resp.json();
              throw new Error(err.detail || 'Generation failed');
            }
            data = await resp.json();
          }
          setResult(data);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }

      function copyCode() {
        if (result?.server_code) {
          navigator.clipboard.writeText(result.server_code).then(() => {
            const btn = event.target;
            btn.textContent = 'Copied!';
            setTimeout(() => (btn.textContent = 'Copy code'), 2000);
          });
        }
      }

      return (
        <main>
          <h1>Generate an MCP Server</h1>
          <p className="sub">Paste an OpenAPI spec URL to generate a ready-to-run Python MCP server.</p>

          <p style={{ color: 'var(--dim)', fontSize: '0.85rem', marginBottom: '12px' }}>Try an example:</p>
          <div className="examples">
            <button className="ex-btn" onClick={() => setUrl('https://petstore.swagger.io/v2/swagger.json')}>
              🐾 Petstore (Swagger 2.0)
            </button>
            <button className="ex-btn" onClick={() => setUrl('https://petstore3.swagger.io/api/v3/openapi.json')}>
              🐾 Petstore (OpenAPI 3.0)
            </button>
            <button className="ex-btn" onClick={() => setUrl('built-in:github')}>
              🐙 GitHub
            </button>
            <button className="ex-btn" onClick={() => setUrl('built-in:weather')}>
              🌤️ Weather
            </button>
            <button className="ex-btn" onClick={() => setUrl('built-in:calculator')}>
              🧮 Calculator
            </button>
          </div>

          <hr className="divider" />

          <div className="row">
            <div>
              <label htmlFor="spec-url">OpenAPI spec URL</label>
              <input
                id="spec-url"
                type="text"
                placeholder="https://api.example.com/openapi.json"
                value={url}
                onChange={(e) => setUrl(e.target.value)}
                onKeyDown={(e) => e.key === 'Enter' && generate()}
              />
            </div>
            <button onClick={generate} disabled={loading}>
              Generate →
            </button>
          </div>

          <div className="field">
            <div className="checkbox-row">
              <input
                type="checkbox"
                id="enhance"
                checked={enhance}
                onChange={(e) => setEnhance(e.target.checked)}
              />
              <label htmlFor="enhance" style={{ margin: 0 }}>
                Enhance descriptions with local Ollama <span style={{ color: 'var(--dim)' }}>(requires Ollama running)</span>
              </label>
            </div>
          </div>

          {loading && (
            <div className="loading show">
              <span className="spinner"></span> Fetching spec and generating MCP server...
            </div>
          )}

          {error && <div className="error">⚠ {error}</div>}

          {result && (
            <div className="result show">
              <div className="result-header">
                <div>
                  <div className="result-title">{result.api_name} — MCP Server</div>
                  <div className="result-meta">{result.tools?.length ?? 0} tools generated</div>
                </div>
                <button className="copy-btn" onClick={copyCode}>
                  Copy code
                </button>
              </div>
              <pre>
                <code ref={codeRef} className="language-python">
                  {result.server_code}
                </code>
              </pre>
              <div className="tools-list">
                {(result.tools || []).map((tool) => (
                  <span key={tool} className="tool-pill">
                    {tool}
                  </span>
                ))}
              </div>
              <p style={{ color: 'var(--dim)', fontSize: '0.85rem', marginTop: '20px' }}>
                Save as <code style={{ color: 'var(--cyan)' }}>my_server.py</code> and run with{' '}
                <code style={{ color: 'var(--cyan)' }}>python my_server.py</code>
              </p>
            </div>
          )}
        </main>
      );
    }

    function ExamplesPage() {
      const [selectedExample, setSelectedExample] = useState(null);
      const codeRef = useRef(null);

      useEffect(() => {
        if (codeRef.current && selectedExample) {
          codeRef.current.removeAttribute('data-highlighted');
          window.hljs.highlightElement(codeRef.current);
        }
      }, [selectedExample]);

      function copyCode() {
        if (selectedExample?.code) {
          navigator.clipboard.writeText(selectedExample.code).then(() => {
            const btn = event.target;
            btn.textContent = 'Copied!';
            setTimeout(() => (btn.textContent = 'Copy'), 2000);
          });
        }
      }

      return (
        <main>
          <h1>Built-in Examples</h1>
          <p className="sub">Ready-to-run MCP servers you can use immediately.</p>

          <div className="examples-grid">
            {Object.entries(EXAMPLES).map(([key, example]) => (
              <div
                key={key}
                className="example-card"
                onClick={() => setSelectedExample(example)}
                style={{
                  cursor: 'pointer',
                  borderColor: selectedExample?.name === example.name ? 'var(--cyan)' : undefined,
                }}
              >
                <div className="example-name">{example.name}</div>
                <div className="example-desc">{example.desc}</div>
                <div className="example-tools">
                  {example.tools.map((tool) => (
                    <span key={tool} className="tool-pill">
                      {tool}
                    </span>
                  ))}
                </div>
              </div>
            ))}
          </div>

          {selectedExample && (
            <div className="example-code">
              <div className="code-header">
                <span className="code-lang">python — {selectedExample.name.replace(/[^a-z0-9]/gi, '').toLowerCase()}_mcp.py</span>
                <button className="copy-btn" onClick={copyCode}>
                  Copy
                </button>
              </div>
              <pre>
                <code ref={codeRef} className="language-python">
                  {selectedExample.code}
                </code>
              </pre>
              <p style={{ color: 'var(--dim)', fontSize: '0.85rem', marginTop: '20px' }}>
                Save this code and run with <code style={{ color: 'var(--cyan)' }}>python server.py</code>
              </p>
            </div>
          )}
        </main>
      );
    }

    function App() {
      const [page, setPage] = useState('generate');

      return (
        <>
          <header>
            <div className="logo">⚡ MCPForge</div>
            <span className="logo-badge">v0.1.0</span>
            <nav>
              <button className={page === 'generate' ? 'active' : ''} onClick={() => setPage('generate')}>
                Generate
              </button>
              <button className={page === 'examples' ? 'active' : ''} onClick={() => setPage('examples')}>
                Examples
              </button>
              <a href="/docs" style={{ color: 'var(--dim)', textDecoration: 'none', fontSize: '0.85rem', paddingTop: '8px' }}>
                API Docs
              </a>
            </nav>
          </header>
          {page === 'generate' ? <GeneratePage /> : <ExamplesPage />}
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
